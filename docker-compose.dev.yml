version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: dut_job_fair_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dut_job_fair
    ports:
      - '5499:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
